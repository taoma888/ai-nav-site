<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真AI进化论 · 一站式智能搜索</title>
<meta name="description" content="AI工具导航，精选AI写作、图片、视频、代码、办公等400+优质工具。DeepSeek、ChatGPT、Midjourney等热门AI工具一键直达。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#050a0a;color:#d4ead4;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid #1a3a1a}
.logo{font-size:24px;font-weight:700;color:#00ff88}
.search-box{background:#0a1410;border:1px solid #1a3a1a;border-radius:12px;padding:20px;margin:20px 0}
.search-input{width:100%;padding:12px;border:1px solid #1a3a1a;background:#050a0a;color:#d4ead4;border-radius:8px;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:20px}
.card{background:#0a1410;border:1px solid #1a3a1a;border-radius:12px;padding:16px;transition:all 0.2s}
.card:hover{border-color:#00ff88;transform:translateY(-2px)}
.card-title{font-size:16px;font-weight:600;color:#00ff88;margin-bottom:8px}
.card-desc{color:#9abf9a;font-size:14px;line-height:1.6}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{background:#0d1a14;padding:3px 8px;border-radius:4px;font-size:12px;color:#527052}
.btn{background:#00ff88;color:#050a06;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600}
.btn:hover{background:#00cc6a}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">真AI进化论</div>
<button class="btn" onclick="location.href='/articles.html'">📖 文章</button>
</div>
<div class="search-box">
<input type="search" class="search-input" placeholder="搜索AI工具：写作、绘画、视频、编程..." id="searchInput" onkeyup="filterTools()">
</div>
<div class="grid" id="toolGrid"></div>
</div>
<script>
const tools=[
{id:0,n:'Gemma 4',e:'💎',c:'agent',d:'Google最新开源大模型，轻量高效',u:'https://ai.google.dev/gemma'},
{id:-1,n:'DeepSeek V3',e:'🐋',c:'agent',d:'最新开源大模型，推理能力强劲',u:'https://chat.deepseek.com'},
{id:-2,n:'Kimi K2',e:'🌙',c:'agent',d:'月之暗面最新模型，超长上下文',u:'https://kimi.moonshot.cn'},
{id:-3,n:'Sora',e:'🎥',c:'video',d:'OpenAI文生视频模型，60秒高质量',u:'https://openai.com/sora'},
{id:-4,n:'Flux',e:'🖼️',c:'image',d:'开源文生图模型，效果媲美Midjourney',u:'https://flux1.ai'},
{id:1,n:'ChatGPT',e:'🤖',c:'agent',d:'对话式AI写作与办公助手',u:'https://chat.openai.com'},
{id:2,n:'Midjourney',e:'🎨',c:'image',d:'AI绘画顶级工具，艺术风格多样',u:'https://midjourney.com'},
{id:3,n:'Claude',e:'🧠',c:'agent',d:'Anthropic研发，安全性强，200K超长上下文',u:'https://claude.ai'},
];
function renderTools(filtered){
const grid=document.getElementById('toolGrid');
grid.innerHTML='';
filtered.forEach(t=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML='<div class="card-title">'+t.e+' '+t.n+'</div><div class="card-desc">'+t.d+'</div><a href="'+t.u+'" target="_blank" class="btn" style="display:inline-block;margin-top:10px">访问</a>';
grid.appendChild(card);
});
}
function filterTools(){
const query=document.getElementById('searchInput').value.toLowerCase();
const filtered=tools.filter(t=>t.n.toLowerCase().includes(query)||t.d.includes(query));
renderTools(filtered);
}
renderTools(tools);
</script>
</body>
</html><!-- Cache: 20260406115517 -->
