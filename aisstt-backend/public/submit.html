<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交网站 - AISSTT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 500px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    
    input[type="text"],
    input[type="url"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 提交网站</h1>
    <p class="subtitle">分享你的优质网站，AI 将自动分类和描述</p>
    
    <form id="submitForm">
      <div class="form-group">
        <label for="title">网站标题 *</label>
        <input 
          type="text" 
          id="title" 
          name="title" 
          placeholder="例如：AI 导航站" 
          required
        >
      </div>
      
      <div class="form-group">
        <label for="url">网站 URL *</label>
        <input 
          type="url" 
          id="url" 
          name="url" 
          placeholder="https://example.com" 
          required
        >
      </div>
      
      <button type="submit" id="submitBtn">
        提交
      </button>
    </form>
    
    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('submitForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const title = document.getElementById('title').value.trim();
      const url = document.getElementById('url').value.trim();
      
      // 显示加载状态
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span>提交中...';
      messageDiv.style.display = 'none';
      
      try {
        const response = await fetch('/api/submit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ title, url })
        });
        
        const data = await response.json();
        
        if (data.success) {
          messageDiv.className = 'message success';
          messageDiv.innerHTML = `
            ✅ 提交成功！<br>
            分类：${data.data.category}<br>
            状态：待审核
          `;
          form.reset();
        } else {
          throw new Error(data.error || '提交失败');
        }
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.innerHTML = `❌ ${error.message}`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '提交';
        messageDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
