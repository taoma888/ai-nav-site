<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>Agent 自我进化引擎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 675px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(138, 43, 226, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0, 255, 255, 0.1) 0%, transparent 30%);
            pointer-events: none;
        }
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        .container {
            text-align: center;
            padding: 60px;
            color: white;
            z-index: 1;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5));
        }
        .title {
            font-size: 64px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00ffff, #8a2be2, #00ffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 3s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }
        .subtitle {
            font-size: 32px;
            font-weight: 400;
            opacity: 0.9;
            line-height: 1.6;
            color: #e0e0e0;
            letter-spacing: 2px;
        }
        .decoration {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            margin: 30px auto;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .circuit {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px solid rgba(0, 255, 255, 0.1);
            border-radius: 50%;
            top: 10%;
            right: 10%;
            animation: rotate 20s linear infinite;
        }
        .circuit::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(138, 43, 226, 0.1);
            border-radius: 50%;
            animation: rotate 15s linear infinite reverse;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="circuit"></div>
    <div class="container">
        <div class="icon">🤖</div>
        <div class="title">Agent 自我进化引擎</div>
        <div class="decoration"></div>
        <div class="subtitle">AI Agent 持续进化 · 安全优化 · 能力提升</div>
    </div>
</body>
</html>
